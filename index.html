<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>After the Last Interview</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="grain"></div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <p class="eyebrow">Aster Archive Fellowship</p>
        <h1>After the Last Interview</h1>
        <p class="brand-note">Surviving records from Blackwood House, Winter Index retreat.</p>
      </div>

      <nav id="nav" class="nav" aria-label="Archive folders"></nav>

      <div class="sidebar-footer">
        <p id="statusLine">Status: partial access</p>
        <p id="phraseLine">Phrase traces: 0 / 3</p>
      </div>
    </aside>

    <main class="viewer">
      <header class="viewer-top">
        <div>
          <p id="metaType" class="meta-label">Case File</p>
          <h2 id="docTitle">After the Last Interview</h2>
        </div>
        <div class="top-meta">
          <p id="metaState">Access granted</p>
          <p id="metaProgress">0 documents opened</p>
        </div>
      </header>

      <section id="docMeta" class="doc-meta"></section>

      <section class="document-frame">
        <article id="content" class="content" tabindex="-1"></article>
        <aside id="footnotes" class="footnotes" aria-label="Annotations"></aside>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
